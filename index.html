<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELOOP // UNBLOCK_TERMINAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="password-gate">
    <div class="gate-content">
        <div class="lock-icon">🔒</div>
        <h2 class="glitch-text" data-text="ENCRYPTED_SECTOR">ENCRYPTED_SECTOR</h2>
        <p>ENTER CLEARANCE KEY TO INITIALIZE TERMINAL</p>
        <input type="password" id="gate-key" placeholder="CODE_NAME..." autofocus>
        <div id="gate-status">STATUS: STANDBY</div>
    </div>
</div>

    <div class="scanline"></div>

    <main class="terminal-wrapper">
        <header class="terminal-header">
            <div class="status-group">
                <span class="pulse"></span>
                <span class="status-text">TUNNEL_ACTIVE // BYPASS_ENABLED</span>
            </div>
            <div class="session-id">SID: 0x882_THRILL</div>
        </header>

        <section class="main-interface">
            <h1 class="glitch-text" data-text="PROXY_TERMINAL">PROXY_TERMINAL</h1>
            <p class="subtitle">ENTER SECURE URL TO INITIALIZE BYPASS</p>

            <div class="input-container">
                <div class="input-prefix">HTTPS://</div>
                <input type="text" id="proxy-url" placeholder="google.com, discord.com, roblox.com..." autofocus>
                <button id="launch-btn">LAUNCH</button>
            </div>

            <div class="quick-links">
                <div class="link-category">
                    <span>SOCIAL_NODES</span>
                    <div class="nodes">
                        <button class="node">DISCORD</button>
                        <button class="node">INSTAGRAM</button>
                    </div>
                </div>
                <div class="link-category">
                    <span>GAME_SERVERS</span>
                    <div class="nodes">
                        <button class="node">ROBLOX</button>
                        <button class="node">GEFORCE_NOW</button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="terminal-footer">
            <div class="warning">CAUTION: TRAFFIC IS BEING ROUTED THROUGH TIMELOOP_ARCHIVE_NODES</div>
        </footer>
    </main>

</body>
</html>
