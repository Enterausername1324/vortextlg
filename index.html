<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELOOP // SECURE_PROXY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="password-gate">
        <div class="gate-content">
            <h2 class="sys-logo">ENCRYPTED.VAULT</h2>
            <p style="font-size: 0.7rem; color: #444; margin-top: 10px;">AUTHORIZED_PERSONNEL_ONLY</p>
            <input type="password" id="gate-key" placeholder="••••••••" autofocus>
            <div id="gate-status" style="margin-top: 20px; font-size: 0.6rem; color: #333;">WAITING_FOR_KEY...</div>
        </div>
    </div>

    <header class="sys-header">
        <div class="sys-logo">TIMELOOP.OS</div>
        <nav class="sys-nav">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="store.html" class="nav-link">Active_Directory</a>
            <a href="proxy.html" class="nav-link active">Bypass_Terminal</a>
        </nav>
    </header>

    <main class="os-container">
        <div class="os-terminal-window">
            <div class="os-term-header">
                <span class="os-term-dot red"></span>
                <span class="os-term-dot yellow"></span>
                <span class="os-term-dot green"></span>
                <span class="os-term-title">TUNNEL_SESSION // VORTEX_ENGINE</span>
            </div>
            
            <div class="os-term-body">
                <p class="term-log" style="color: var(--neon-cyan)">>> TUNNEL_ACTIVE: vortex-tbmr.onrender.com</p>
                <h1 class="term-main-title">PROXY TERMINAL</h1>
                
                <div class="input-container">
                    <div class="input-prefix">HTTPS://</div>
                    <input type="text" id="proxy-url" placeholder="ENTER_URL_TO_BYPASS..." autocomplete="off">
                    <button id="launch-btn" class="sys-btn" style="border:none; padding: 0 20px;">LAUNCH</button>
                </div>

                <div class="quick-links">
                    <div class="link-category">
                        <button class="node">DISCORD</button>
                        <button class="node">ROBLOX</button>
                    </div>
                    <div class="link-category">
                        <button class="node">INSTAGRAM</button>
                        <button class="node">GEFORCE_NOW</button>
                    </div>
                </div>

                <p style="margin-top: 40px; font-size: 0.6rem; color: #333;">
                    BYPASS_MODE: ABOUT_BLANK_CLOAKING // PRESS ESC TO PANIC
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
