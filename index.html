<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELOOP // VORTEX_TERMINAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="sys-header">
        <div class="sys-logo">TIMELOOP.OS</div>
    </header>

    <main class="os-container">
        <div class="os-terminal-window">
            <div class="os-term-header">
                <div class="dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="os-term-title">SECURE_UPLINK // VORTEX_GATEWAY</div>
            </div>
            
            <div class="os-term-body">
                <p class="term-log cyan">>> TUNNEL_STATUS: READY</p>
                <h1 class="term-main-title">PROXY TERMINAL</h1>
                
                <div class="input-container">
                    <div class="input-prefix">HTTPS://</div>
                    <input type="text" id="proxy-url" placeholder="ENTER_DESTINATION..." autofocus>
                    <button id="launch-btn" class="sys-btn">LAUNCH</button>
                </div>

                <div class="quick-links">
                    <button class="node">DISCORD</button>
                    <button class="node">ROBLOX</button>
                    <button class="node">INSTAGRAM</button>
                    <button class="node">GEFORCE_NOW</button>
                </div>

                <p class="term-log footer-note">BYPASS_MODE: ABOUT_BLANK // ESC_TO_PANIC</p>
            </div>
        </div>
    </main>

    <footer class="sys-footer">
        <p>TIMELOOP THRILL CORP // VORTEX ENGINE v2.0</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
